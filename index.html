<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>flag of the day</title>
  <style>
    body {
      font-family: sans-serif;
      max-width: 600px;
      margin: 60px auto;
      padding: 0 20px;
      background: #fff;
      color: #111;
    }

    h1 {
      font-size: 24px;
      margin-bottom: 4px;
    }

    #count {
      color: #888;
      font-size: 14px;
      margin-bottom: 24px;
    }

    input {
      width: 100%;
      padding: 8px 12px;
      font-size: 14px;
      border: 1px solid #ddd;
      outline: none;
      margin-bottom: 24px;
      box-sizing: border-box;
    }

    input:focus { border-color: #111; }

    .row {
      display: flex;
      align-items: baseline;
      gap: 12px;
      padding: 8px 0;
      border-bottom: 1px solid #f0f0f0;
    }

    .row.hidden { display: none; }

    .day {
      color: #aaa;
      font-size: 12px;
      min-width: 48px;
    }

    .row a {
      color: #111;
      font-size: 15px;
    }

    .row a:hover { color: #0066cc; }

    .alt {
      font-size: 12px;
      color: #888;
    }

    .alt a { color: #888; font-size: 12px; }
    .alt a:hover { color: #0066cc; }
  </style>
</head>
<body>
  <h1>flag of the day</h1>
  <div id="count"></div>
  <input type="text" id="search" placeholder="search…" autocomplete="off"/>
  <div id="list"></div>

  <script>
    async function setFaviconFromWikimedia(pageUrl) {
      try {
        const match = pageUrl.match(/\/wiki\/(File:[^#?]+)/);
        if (!match) return;
        const title = decodeURIComponent(match[1]);

        const api = `https://commons.wikimedia.org/w/api.php?action=query&titles=${encodeURIComponent(title)}&prop=imageinfo&iiprop=url&format=json&origin=*`;
        const res = await fetch(api);
        const data = await res.json();

        const pages = data.query.pages;
        const page = pages[Object.keys(pages)[0]];
        const imageUrl = page?.imageinfo?.[0]?.url;
        if (!imageUrl) return;

        const link = document.createElement('link');
        link.rel = 'icon';
        link.href = imageUrl;
        document.head.appendChild(link);
      } catch (e) {
        // Silently fail — no favicon is fine
      }
    }

    (async () => {
      const res = await fetch('FOTD.html');
      const html = await res.text();
      const doc = new DOMParser().parseFromString(html, 'text/html');
      const rows = [...doc.querySelectorAll('tr')];
      const list = document.getElementById('list');
      let count = 0;
      let lastUrl = null;

      rows.forEach(row => {
        const cells = row.querySelectorAll('td');
        if (!cells.length) return;
        const dayText = cells[0].textContent.trim();
        if (!dayText.match(/^Day \d+$/i)) return;

        const mainLink = cells[1]?.querySelector('a');
        if (!mainLink) return;

        const mainHref = mainLink.getAttribute('href');
        const altLink = cells[2]?.querySelector('a');
        const altHref = altLink?.getAttribute('href');

        const div = document.createElement('div');
        div.className = 'row';
        div.dataset.name = mainLink.textContent.toLowerCase();
        div.dataset.day = dayText.toLowerCase();

        div.innerHTML = `
          <span class="day">${dayText.replace('Day ', '#')}</span>
          <a href="${mainHref}" target="_blank">${mainLink.textContent}</a>
          ${altHref ? `<span class="alt">— <a href="${altHref}" target="_blank">alt</a></span>` : ''}
        `;

        list.appendChild(div);
        lastUrl = mainHref;
        count++;
      });

      document.getElementById('count').textContent = `${count} flags. ${count} days.`;

      if (lastUrl && lastUrl.includes('wikimedia.org')) {
        setFaviconFromWikimedia(lastUrl);
      }

      document.getElementById('search').addEventListener('input', e => {
        const q = e.target.value.toLowerCase();
        document.querySelectorAll('.row').forEach(row => {
          row.classList.toggle('hidden', q && !row.dataset.name.includes(q) && !row.dataset.day.includes(q));
        });
      });
    })();
  </script>
</body>
</html>
